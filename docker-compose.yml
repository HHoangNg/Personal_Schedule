services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      APP_ENV: ${APP_ENV:-production}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      QDRANT_SYNC_ENABLED: ${QDRANT_SYNC_ENABLED:-false}
      DATABASE_PATH: /app/data/productivity.db
    volumes:
      - api_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ["qdrant"]
    restart: unless-stopped
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
volumes:
  qdrant_data:
  api_data:
